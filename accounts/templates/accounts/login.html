{% extends "pages/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <h1>Login</h1>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
  </form>
  <p>No account? <a href="{% url 'register' %}">Register</a></p>
{% endblock %}
